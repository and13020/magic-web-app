{{define "search"}}
<div class="container">
  <h1>Type name of card:</h1>
  <!-- Action "/search" takes us to /search page -->
    <form action="/search" method="post" autocomplete="off">
        <div class="form-group">
            <label for="name">Search:</label><br>
            <input type="text" id="name" name="name" value="black lotus" <br>
        </div>
        <button type="submit" class="btn-primary">Search</button>
    </form>
    {{template "cards" .}}
</div>
{{end}}
